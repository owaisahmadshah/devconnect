name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"

jobs:
  deploy:
    name: Build and Deploy to EC2
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.4.1

      - name: Install dependencies
        run: pnpm install

      - name: Build all packages
        run: |
          pnpm build:shared
          pnpm build:server
      - name: Build client
        run: pnpm build:client
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "server/dist/,client/dist/,shared/dist/,package.json,pnpm-lock.yaml,pnpm-workspace.yaml,server/package.json,client/package.json,shared/package.json"
          target: "/home/ubuntu/devconnect"

      - name: SSH and restart app
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/devconnect
            which pnpm || npm install -g pnpm@10.4.1
            pnpm install --prod
            # Ensure the path to index.js is correct based on your 'server/dist'
            pm2 restart devconnect-server || pm2 start server/dist/src/index.js --name "devconnect-server" --node-args="--env-file=server/.env"
            pm2 save
